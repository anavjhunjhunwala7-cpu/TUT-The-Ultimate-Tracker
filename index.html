<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE TRACKER PRO</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4222/4222003.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #050505; --panel: rgba(20, 20, 23, 0.8); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Glass Panels with Reflective Edge */
        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.12);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Score Glow Circle */
        .score-display {
            width: 150px; height: 150px;
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(34, 197, 94, 0.3);
            background: radial-gradient(circle at top, rgba(34, 197, 94, 0.1), transparent);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
            margin: 20px auto;
        }

        /* Fixed Grid Calendar */
        .grid-7 { display: grid; grid-template-cols: repeat(7, 1fr); gap: 6px; }
        .grid-cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-size: 0.75rem; font-weight: 700;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
        }
        .cell-done { background: rgba(34, 197, 94, 0.2) !important; color: var(--neon); border-color: var(--neon) !important; }
        .cell-missed { background: rgba(239, 68, 68, 0.1) !important; color: #ef4444; border-color: #ef4444; }

        /* Inputs - Fixed White Box Issue */
        input, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: var(--neon) !important;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.85rem;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
        }

        /* Navigation */
        .nav-dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(10,10,10,0.85); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 12px 10px 30px; display: flex; z-index: 1000;
        }
        .nav-link { flex: 1; text-align: center; font-size: 10px; font-weight: 800; color: #555; letter-spacing: 1px; }
        .nav-link.active { color: var(--neon); }

        .workout-tag { padding: 6px 12px; border-radius: 20px; border: 1px solid #333; font-size: 12px; font-weight: 600; }
        .workout-tag.selected { background: var(--neon); color: #000; border-color: var(--neon); }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="view-log" class="space-y-6">
        <div class="text-center pt-4">
            <p id="quote" class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.3em] mb-4 italic"></p>
            <div class="score-display">
                <span id="score-pct" class="text-5xl font-black" style="color:var(--neon); text-shadow: 0 0 15px rgba(34,197,94,0.4);">0%</span>
                <span id="date-label" class="text-[9px] font-bold text-zinc-400 mt-1 uppercase tracking-widest"></span>
            </div>
        </div>

        <div id="task-list" class="space-y-6"></div>

        <button onclick="saveData()" class="w-full py-5 rounded-2xl font-black text-lg uppercase tracking-tighter transition-all active:scale-95" style="background:var(--neon); color:#000; box-shadow: 0 0 25px rgba(34,197,94,0.3);">
            Lock In Entry
        </button>
    </div>

    <div id="view-cal" class="hidden space-y-6">
        <div class="flex justify-between items-center px-2">
            <button onclick="moveMonth(-1)" class="text-zinc-500 font-bold">←</button>
            <h2 id="month-name" class="font-black uppercase tracking-widest text-sm"></h2>
            <button onclick="moveMonth(1)" class="text-zinc-500 font-bold">→</button>
        </div>
        <div class="glass-panel p-5">
            <div class="grid-7 mb-4">
                <div class="text-[9px] text-center font-black text-zinc-600">S</div>
                <div class="text-[9px] text-center font-black text-zinc-600">M</div>
                <div class="text-[9px] text-center font-black text-zinc-600">T</div>
                <div class="text-[9px] text-center font-black text-zinc-600">W</div>
                <div class="text-[9px] text-center font-black text-zinc-600">T</div>
                <div class="text-[9px] text-center font-black text-zinc-600">F</div>
                <div class="text-[9px] text-center font-black text-zinc-600">S</div>
            </div>
            <div id="main-grid" class="grid-7"></div>
        </div>
    </div>

    <div id="view-stats" class="hidden space-y-4">
        <div id="stats-container" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="workout-modal" class="fixed inset-0 bg-black/90 z-[2000] hidden items-end p-4">
        <div class="glass-panel w-full p-6 space-y-6 animate-slide-up">
            <h3 class="text-xl font-black uppercase tracking-tighter italic" style="color:var(--neon)">Select Focus</h3>
            <div id="tag-cloud" class="flex flex-wrap gap-2"></div>
            <button onclick="closeWorkout()" class="w-full py-4 bg-white text-black font-black rounded-xl uppercase">Done</button>
        </div>
    </div>

    <nav class="nav-dock">
        <div onclick="setTab('log')" id="btn-log" class="nav-link active">LOG</div>
        <div onclick="setTab('cal')" id="btn-cal" class="nav-link">CALENDAR</div>
        <div onclick="setTab('stats')" id="btn-stats" class="nav-link">INSIGHTS</div>
    </nav>

    <script>
        const quotes = ["Discipline equals freedom.", "Consistency is the only currency.", "Nothing changes if nothing changes.", "Win the morning.", "The price of regret is heavier.", "Don't negotiate with yourself.", "Stay uncomfortable.", "One more rep.", "Your future self is watching.", "Hard work works."];
        const habits = [
            { id: 'm_push', label: 'Morning Pushups', type: 'select', range: [0, 150, 5], cat: 'Rituals' },
            { id: 'm_squat', label: 'Morning Squats', type: 'select', range: [0, 150, 5], cat: 'Rituals' },
            { id: 'neeti', label: 'Jal Neeti', type: 'check', cat: 'Rituals' },
            { id: 'flossing', label: 'Flossing', type: 'check', cat: 'Rituals' },
            { id: 'meditation', label: 'Meditation', type: 'num', unit: 'min', cat: 'Mental' },
            { id: 'hanuman', label: 'Hanuman Chalisa', type: 'check', cat: 'Mental' },
            { id: 'book', label: 'Read Book', type: 'select', range: [5, 100, 5], cat: 'Mental' },
            { id: 'journal', label: 'Journaled', type: 'check', cat: 'Mental' },
            { id: 'work', label: 'Workout', type: 'workout', cat: 'Physical' },
            { id: 'steps', label: 'Steps', type: 'num', unit: 's', cat: 'Physical' },
            { id: 'mouth_tape', label: 'Mouth Taping', type: 'check', cat: 'Physical' },
            { id: 'prot', label: 'Protein', type: 'select', range: [90, 200, 5], cat: 'Nutrition' },
            { id: 'water', label: 'Water', type: 'select', range: [2, 5, 0.25], cat: 'Nutrition' },
            { id: 'no_alc', label: 'No Alcohol', type: 'check', cat: 'Vices' },
            { id: 'no_sug', label: 'No Sugar', type: 'check', cat: 'Vices' }
        ];

        let db = JSON.parse(localStorage.getItem('ultimate_v7')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let viewMonth = new Date();

        function fmt(dateStr) {
            const d = new Date(dateStr);
            const m = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            return `${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
        }

        function refresh() {
            document.getElementById('quote').innerText = quotes[new Date().getDate() % quotes.length];
            document.getElementById('date-label').innerText = fmt(activeDate);
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            const cats = [...new Set(habits.map(h => h.cat))];
            cats.forEach(c => {
                let section = `<div class="glass-panel p-5"><h3 class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.2em] mb-4 border-b border-white/5 pb-2">${c}</h3><div class="space-y-5">`;
                habits.filter(h => h.cat === c).forEach(h => {
                    const data = db[activeDate] || {};
                    const checked = data[h.id + '_c'] || false;
                    const val = data[h.id + '_v'] || '';

                    section += `<div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" onchange="upd('${h.id}', 'c', this.checked)" ${checked ? 'checked' : ''} style="width:20px; height:20px; accent-color:var(--neon)">
                            <span class="text-sm font-bold ${checked ? 'text-white' : 'text-zinc-500'}">${h.label}</span>
                        </div>`;
                    
                    if(h.type === 'select') {
                        section += `<select onchange="upd('${h.id}', 'v', this.value)"><option value="">-</option>`;
                        for(let i=h.range[0]; i<=h.range[1]; i+=h.range[2]) section += `<option value="${i}" ${val==i?'selected':''}>${i}</option>`;
                        section += `</select>`;
                    } else if(h.type === 'num') {
                        section += `<div class="flex items-center gap-1"><input type="number" value="${val}" onchange="upd('${h.id}', 'v', this.value)" style="width:60px"> <span class="text-[10px] text-zinc-600 font-bold">${h.unit}</span></div>`;
                    } else if(h.type === 'workout') {
                        section += `<button onclick="openWorkout()" class="text-[10px] font-black uppercase text-green-500 border border-green-900 px-3 py-1 rounded-lg">${val || 'Select'}</button>`;
                    }
                    section += `</div>`;
                });
                list.innerHTML += section + `</div></div>`;
            });
            calc();
        }

        function upd(id, key, val) {
            if(!db[activeDate]) db[activeDate] = {};
            db[activeDate][id + '_' + key] = val;
            calc();
        }

        function calc() {
            const data = db[activeDate] || {};
            let done = habits.filter(h => data[h.id + '_c']).length;
            document.getElementById('score-pct').innerText = Math.round((done / habits.length) * 100) + '%';
        }

        function saveData() {
            localStorage.setItem('ultimate_v7', JSON.stringify(db));
            alert("ENTRY SECURED.");
        }

        function setTab(t) {
            ['log','cal','stats'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='cal') renderCal();
            if(t==='stats') renderStats();
        }

        function renderCal() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = '';
            const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
            document.getElementById('month-name').innerText = new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'}).format(viewMonth);
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=last; i++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = db[ds];
                grid.innerHTML += `<div onclick="jump('${ds}')" class="grid-cell ${ds === activeDate ? 'active' : ''} ${hasData ? 'cell-done' : ''}">${i}</div>`;
            }
        }

        function jump(d) { activeDate = d; setTab('log'); refresh(); }
        function moveMonth(n) { viewMonth.setMonth(viewMonth.getMonth() + n); renderCal(); }

        function openWorkout() {
            const options = ["Back", "Biceps", "Chest", "Core", "Legs", "Shoulders", "Triceps", "Run", "Walk", "Cycle", "Other"];
            const cloud = document.getElementById('tag-cloud'); cloud.innerHTML = '';
            const current = (db[activeDate] || {})['work_v'] || '';
            options.forEach(opt => {
                cloud.innerHTML += `<div onclick="upd('work','v','${opt}'); closeWorkout(); refresh();" class="workout-tag ${current===opt?'selected':''}">${opt}</div>`;
            });
            document.getElementById('workout-modal').classList.remove('hidden');
            document.getElementById('workout-modal').classList.add('flex');
        }

        function closeWorkout() { document.getElementById('workout-modal').classList.add('hidden'); }

        function renderStats() {
            const container = document.getElementById('stats-container'); container.innerHTML = '';
            habits.filter(h => h.type === 'select' || h.type === 'num').forEach(h => {
                let sum = 0, count = 0;
                Object.values(db).forEach(day => {
                    if(day[h.id + '_v']) { sum += parseFloat(day[h.id + '_v']); count++; }
                });
                const avg = count > 0 ? (sum / count).toFixed(1) : 0;
                container.innerHTML += `<div class="glass-panel p-4 text-center"><div class="text-[9px] font-black text-zinc-500 uppercase mb-1">${h.label}</div><div class="text-xl font-black">${avg}<span class="text-[10px] ml-1 text-zinc-600">${h.unit||''}</span></div></div>`;
            });
        }

        refresh();
    </script>
</body>
</html>
