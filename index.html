<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE TRACKER PRO</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4222/4222003.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --neon-glow: rgba(34, 197, 94, 0.3); }
        body { background: #050505; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Glassmorphism & 3D Depth */
        .glass { 
            background: rgba(20, 20, 23, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-top: 1px solid rgba(255,255,255,0.15); /* Reflective Light Line */
            border-radius: 1.5rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .neon-text { text-shadow: 0 0 10px var(--neon-glow); color: var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px var(--neon-glow); }
        
        /* Score Glow */
        .score-circle {
            width: 180px; height: 180px;
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 40px var(--neon-glow);
            border: 1px solid rgba(34, 197, 94, 0.2);
            position: relative;
        }

        /* Calendar Grid */
        .calendar-grid { display: grid; grid-template-cols: repeat(7, 1fr); gap: 6px; }
        .cal-day { aspect-ratio: 1/1; border-radius: 6px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .day-done { background: #14532d; color: #4ade80; border-color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        .day-missed { background: #450a0a; color: #f87171; border-color: #991b1b; }
        
        /* Dropdowns */
        select { 
            background: #111; border: 1px solid #333; color: var(--neon); 
            border-radius: 8px; padding: 4px 10px; text-align-last: center; outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; padding: 10px 10px 30px; z-index: 100; }
        .nav-btn { flex: 1; text-align: center; font-size: 10px; font-weight: 800; color: #555; transition: 0.3s; }
        .nav-btn.active { color: var(--neon); transform: translateY(-2px); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(10px); }
        
        /* Transitions */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex flex-col items-center mb-6 pt-4">
        <p id="motivation" class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-2 italic"></p>
        <div class="score-circle">
            <span id="day-score" class="text-5xl font-black neon-text">0%</span>
            <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mt-1">Consistency</span>
        </div>
        <button onclick="openPeriodPicker()" class="mt-6 flex items-center gap-2 px-5 py-2 glass active:scale-95 transition-all">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
            <span id="active-period-label" class="text-[10px] font-black uppercase tracking-widest">Today</span>
        </button>
    </div>

    <div id="view-log" class="space-y-6">
        <div id="task-container" class="space-y-6"></div>
        <button onclick="saveData()" class="w-full neon-border bg-green-500 text-black font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-tighter text-lg shadow-[0_0_20px_rgba(34,197,94,0.4)]">
            Commit Data
        </button>
    </div>

    <div id="view-cal" class="hidden space-y-6 fade-in">
        <div class="flex justify-between items-center px-2">
            <button onclick="changeMonth(-1)" class="text-zinc-500 font-bold">←</button>
            <h2 id="month-label" class="font-black uppercase tracking-widest text-zinc-200"></h2>
            <button onclick="changeMonth(1)" class="text-zinc-500 font-bold">→</button>
        </div>
        <div id="main-calendar" class="glass p-5"></div>
    </div>

    <div id="view-stats" class="hidden space-y-4 fade-in">
        <div id="stats-grid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="detail-modal" class="modal" onclick="this.style.display='none'">
        <div class="glass w-full p-6 space-y-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center">
                <h3 id="detail-title" class="text-xl font-black uppercase italic neon-text">Habit Name</h3>
                <div id="detail-avg" class="text-right">
                    <div class="text-[9px] text-zinc-500 uppercase font-bold">Lifetime Avg</div>
                    <div id="detail-avg-val" class="text-lg font-black text-white">0</div>
                </div>
            </div>
            <div id="detail-calendar" class="calendar-grid"></div>
            <button onclick="document.getElementById('detail-modal').style.display='none'" class="w-full py-3 glass text-[10px] font-black uppercase tracking-widest">Close</button>
        </div>
    </div>

    <div id="period-modal" class="modal" onclick="this.style.display='none'">
        <div class="glass w-full p-6 space-y-4" onclick="event.stopPropagation()">
            <h3 class="text-xs font-black uppercase text-zinc-500 tracking-widest mb-2 text-center">Select Timeframe</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setPeriod('today')" class="glass p-3 text-[10px] font-bold uppercase">Today</button>
                <button onclick="setPeriod('7d')" class="glass p-3 text-[10px] font-bold uppercase">Last 7 Days</button>
                <button onclick="setPeriod('1m')" class="glass p-3 text-[10px] font-bold uppercase">Last Month</button>
                <button onclick="setPeriod('3m')" class="glass p-3 text-[10px] font-bold uppercase">Last 3 Months</button>
                <button onclick="setPeriod('6m')" class="glass p-3 text-[10px] font-bold uppercase">Last 6 Months</button>
                <button onclick="setPeriod('all')" class="glass p-3 text-[10px] font-bold uppercase">Inception</button>
            </div>
            <div class="pt-4 border-t border-zinc-800">
                <p class="text-[9px] text-zinc-500 uppercase text-center mb-2">Custom Range</p>
                <div class="flex gap-2">
                    <input type="date" id="custom-start" class="bg-zinc-900 text-[10px] p-2 rounded flex-1">
                    <input type="date" id="custom-end" class="bg-zinc-900 text-[10px] p-2 rounded flex-1">
                </div>
                <button onclick="setPeriod('custom')" class="w-full mt-3 bg-white text-black text-[10px] font-black py-2 rounded uppercase">Apply Custom</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button onclick="switchTab('log')" id="tab-log" class="nav-btn active">LOG</button>
        <button onclick="switchTab('cal')" id="tab-cal" class="nav-btn">CALENDAR</button>
        <button onclick="switchTab('stats')" id="tab-stats" class="nav-btn">INSIGHTS</button>
    </nav>

    <script>
        const quotes = ["DISCIPLINE = FREEDOM", "NOTHING CHANGES IF NOTHING CHANGES", "STAY HUNGRY", "BE UNCOMFORTABLE", "WIN THE MORNING", "CONSISTENCY IS THE ONLY CURRENCY", "STOP NEGOTIATING WITH YOURSELF", "ONE MORE REP", "THE PRICE OF REGRET IS HEAVIER", "YOUR FUTURE SELF IS WATCHING"];
        // ... imagine 90 more quotes here ...
        
        const schema = [
            { id: 'm_push', label: 'Morning Pushups', type: 'select', range: [0, 150, 5], cat: 'Morning Rituals' },
            { id: 'm_squat', label: 'Morning Squats', type: 'select', range: [0, 150, 5], cat: 'Morning Rituals' },
            { id: 'neeti', label: 'Jal Neeti', type: 'check', cat: 'Morning Rituals' },
            { id: 'flossing', label: 'Flossing', type: 'check', cat: 'Morning Rituals' },
            { id: 'meditation', label: 'Meditation', type: 'text', unit: 'min', cat: 'Mental' },
            { id: 'hanuman', label: 'Hanuman Chalisa', type: 'check', cat: 'Mental' },
            { id: 'news', label: 'Newspaper', type: 'check', cat: 'Mental' },
            { id: 'book', label: 'Read Book', type: 'select', range: [5, 100, 5], cat: 'Mental' },
            { id: 'journal', label: 'Journaled', type: 'check', cat: 'Mental' },
            { id: 'finshots', label: 'Finshots', type: 'check', cat: 'Mental' },
            { id: 'work', label: 'Workout', type: 'workout', cat: 'Physical' },
            { id: 'steps', label: 'Steps', type: 'steps', cat: 'Physical' },
            { id: 'hang', label: 'Dead Hang', type: 'select', range: [0, 300, 5], cat: 'Physical' },
            { id: 'mouth_tape', label: 'Mouth Taping', type: 'check', cat: 'Physical' },
            { id: 'prot', label: 'Protein', type: 'select', range: [90, 200, 5], cat: 'Nutrition' },
            { id: 'water', label: 'Water', type: 'select', range: [2, 5, 0.25], cat: 'Nutrition' },
            { id: 'weight', label: 'Body Weight', type: 'text', unit: 'kg', cat: 'Nutrition' },
            { id: 'no_alc', label: 'No Alcohol', type: 'check', cat: 'Vices' },
            { id: 'no_fried', label: 'No Fried', type: 'check', cat: 'Vices' },
            { id: 'no_sug', label: 'No Sugar', type: 'check', cat: 'Vices' }
        ];

        let db = JSON.parse(localStorage.getItem('tracker_v6_pro')) || {};
        const INCEPTION = '2026-03-02';
        let activeDate = new Date().toISOString().split('T')[0];
        let currentPeriod = 'today';
        let viewMonth = new Date();

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${String(d.getFullYear()).substring(2)}`;
        }

        function init() {
            document.getElementById('motivation').innerText = quotes[new Date().getDate() % quotes.length];
            renderLog();
        }

        function renderLog() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';
            const cats = [...new Set(schema.map(s => s.cat))];
            const data = db[activeDate] || {};

            cats.forEach(c => {
                let html = `<div class="glass p-5 fade-in"><h2 class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.2em] mb-4 border-b border-zinc-800 pb-2 flex justify-between"><span>${c}</span></h2><div class="space-y-5">`;
                schema.filter(s => s.cat === c).forEach(t => {
                    const checked = data[t.id + '_checked'] || false;
                    const val = data[t.id + '_val'] || '';
                    html += `<div class="flex items-center justify-between">
                        <div class="flex items-center gap-3" onclick="showHabitDetail('${t.id}')">
                            <input type="checkbox" id="${t.id}_check" ${checked ? 'checked' : ''} onchange="calculateScore()">
                            <span class="text-sm font-bold ${checked ? 'text-white' : 'text-zinc-600'}">${t.label}</span>
                        </div>`;
                    
                    if (['select', 'steps', 'fast'].includes(t.type)) {
                        const opts = generateOptions(t.type, t.range);
                        html += `<select id="${t.id}_val">${opts.map(o => `<option value="${o}" ${val == o ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                    } else if(t.type !== 'check') {
                        html += `<input type="text" id="${t.id}_val" value="${val}" class="text-right" placeholder="${t.unit || ''}">`;
                    }
                    html += `</div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
            document.getElementById('active-period-label').innerText = formatDate(activeDate);
            calculateScore();
        }

        function generateOptions(type, range) {
            let opts = [""];
            if(type === 'steps') {
                for(let i=8000; i<=15000; i+=250) opts.push(i);
                for(let i=15500; i<=20000; i+=500) opts.push(i);
                return opts;
            }
            const [min, max, step] = range;
            for(let i=min; i<=max; i+=step) opts.push(i);
            return opts;
        }

        function calculateScore() {
            const tasks = schema;
            let done = 0;
            tasks.forEach(t => { if(document.getElementById(t.id + '_check')?.checked) done++; });
            const score = Math.round((done/tasks.length)*100);
            document.getElementById('day-score').innerText = score + '%';
        }

        function showHabitDetail(id) {
            const habit = schema.find(s => s.id === id);
            document.getElementById('detail-title').innerText = habit.label;
            document.getElementById('detail-modal').style.display = 'flex';
            
            const grid = document.getElementById('detail-calendar');
            grid.innerHTML = '';
            
            let total = 0, count = 0;
            // Show last 28 days
            for(let i=27; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                const done = db[ds] && db[ds][id + '_checked'];
                const val = db[ds] ? parseFloat(db[ds][id + '_val']) : NaN;
                if(!isNaN(val)) { total += val; count++; }
                
                grid.innerHTML += `<div class="cal-day ${done ? 'day-done' : 'day-missed'}">${d.getDate()}</div>`;
            }
            document.getElementById('detail-avg-val').innerText = count > 0 ? (total/count).toFixed(1) : 'N/A';
        }

        function openPeriodPicker() { document.getElementById('period-modal').style.display = 'flex'; }

        function setPeriod(p) {
            currentPeriod = p;
            document.getElementById('period-modal').style.display = 'none';
            // In a real app, this would filter the "Insights" data. For now, it updates labels.
            if(p === 'today') { activeDate = new Date().toISOString().split('T')[0]; renderLog(); }
            renderStats();
        }

        function saveData() {
            if(!db[activeDate]) db[activeDate] = {};
            schema.forEach(s => {
                db[activeDate][s.id + '_checked'] = document.getElementById(s.id + '_check').checked;
                if(s.type !== 'check') db[activeDate][s.id + '_val'] = document.getElementById(s.id + '_val').value;
            });
            localStorage.setItem('tracker_v6_pro', JSON.stringify(db));
            alert("SUCCESS: DATA COMMITTED TO THE CHAIN.");
        }

        function renderStats() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = '';
            const metrics = [{id:'prot', l:'Protein'}, {id:'m_push', l:'Pushups'}, {id:'steps', l:'Steps'}];
            
            metrics.forEach(m => {
                let total = 0, count = 0;
                Object.keys(db).forEach(d => {
                    const val = parseFloat(db[d][m.id + '_val']);
                    if(!isNaN(val)) { total += val; count++; }
                });
                const avg = count > 0 ? (total/count).toFixed(1) : 0;
                grid.innerHTML += `<div class="glass p-5"><div class="text-[9px] font-black text-zinc-500 uppercase mb-2">${m.l} Avg</div><div class="text-2xl font-black">${avg}</div></div>`;
            });
        }

        function switchTab(t) {
            ['log','cal','stats'].forEach(tab => document.getElementById('view-'+tab).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t==='cal') renderMainCalendar();
            if(t==='stats') renderStats();
        }

        function renderMainCalendar() {
            const container = document.getElementById('main-calendar');
            container.innerHTML = '<div class="calendar-grid"></div>';
            const grid = container.querySelector('.calendar-grid');
            const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'}).format(viewMonth);
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=days; i++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = db[ds];
                grid.innerHTML += `<div onclick="activeDate='${ds}'; switchTab('log'); renderLog()" class="cal-day ${ds === activeDate ? 'neon-border' : ''} ${hasData ? 'day-done' : ''}">${i}</div>`;
            }
        }

        function changeMonth(dir) { viewMonth.setMonth(viewMonth.getMonth() + dir); renderMainCalendar(); }

        init();
    </script>
</body>
</html>
