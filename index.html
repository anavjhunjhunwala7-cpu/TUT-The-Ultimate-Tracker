<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE TRACKER PRO</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4222/4222003.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #22c55e; --bg: #050505; --glass: rgba(20, 20, 23, 0.9); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 3D Glassmorphism */
        .glass { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Fixed 7-Column Grid */
        .cal-grid { display: grid; grid-template-cols: repeat(7, 1fr); gap: 6px; width: 100%; }
        .cal-cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 800; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
        }
        .cell-green { background: rgba(34, 197, 94, 0.2) !important; color: var(--neon); border-color: var(--neon) !important; box-shadow: 0 0 10px rgba(34,197,94,0.2); }
        .cell-red { background: rgba(239, 68, 68, 0.15) !important; color: #f87171; border-color: rgba(239, 68, 68, 0.3); }

        /* Inputs - Centered & Fixed White Boxes */
        input, select {
            background: rgba(0,0,0,0.4) !important; color: var(--neon) !important;
            border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 8px;
            padding: 6px; font-size: 0.8rem; text-align: center; text-align-last: center; outline: none;
            -webkit-appearance: none; min-width: 80px;
        }

        /* Custom Checkbox */
        .cb-container { position: relative; width: 24px; height: 24px; }
        .cb-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { 
            position: absolute; top: 0; left: 0; height: 24px; width: 24px; 
            background-color: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 6px; 
        }
        .cb-container input:checked ~ .checkmark { background-color: var(--neon); border-color: var(--neon); box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 8px; top: 4px; width: 6px; height: 11px; border: solid black; border-width: 0 3px 3px 0; transform: rotate(45deg); }
        .cb-container input:checked ~ .checkmark:after { display: block; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(30px); border-top: 1px solid #222; display: flex; padding: 12px 10px 35px; z-index: 1000; }
        .nav-btn { flex: 1; text-align: center; font-size: 10px; font-weight: 900; color: #444; }
        .nav-btn.active { color: var(--neon); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-40">

    <div id="v-log" class="space-y-6">
        <div class="text-center py-6">
            <p id="quote" class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.3em] mb-4 italic"></p>
            <div class="inline-flex flex-col items-center justify-center w-40 h-40 rounded-full border border-green-900/30 bg-gradient-to-b from-green-500/10 to-transparent shadow-[0_0_50px_rgba(34,197,94,0.1)]">
                <span id="big-score" class="text-5xl font-black text-green-400">0%</span>
                <span class="text-[8px] font-black text-zinc-500 uppercase tracking-widest mt-1">Consistency</span>
            </div>
            
            <button onclick="openPeriod()" class="mt-8 flex items-center gap-2 px-6 py-2 glass mx-auto active:scale-95 transition-all">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span id="cur-date-label" class="text-[10px] font-black text-white uppercase tracking-widest"></span>
            </button>
        </div>

        <div id="tasks" class="space-y-6"></div>
        
        <button onclick="save()" class="w-full py-5 glass font-black uppercase text-green-400 border-green-500/40 shadow-[0_0_20px_rgba(34,197,94,0.2)]">Commit to Chain</button>
    </div>

    <div id="v-cal" class="hidden space-y-6">
        <div class="flex justify-between items-center px-4">
            <button onclick="chMonth(-1)" class="text-zinc-500 font-bold">←</button>
            <h2 id="month-label" class="font-black uppercase tracking-widest text-sm"></h2>
            <button onclick="chMonth(1)" class="text-zinc-500 font-bold">→</button>
        </div>
        <div class="glass p-5">
            <div class="cal-grid mb-2 text-[9px] font-black text-zinc-600 text-center">
                <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
            </div>
            <div id="main-cal-grid" class="cal-grid"></div>
        </div>
    </div>

    <div id="v-stats" class="hidden space-y-4">
        <div id="stats-render" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="habit-modal" class="modal" onclick="this.style.display='none'">
        <div class="glass w-full p-6 space-y-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-end">
                <h3 id="h-title" class="text-xl font-black italic uppercase text-green-400"></h3>
                <div class="text-right">
                    <div class="text-[8px] text-zinc-500 uppercase font-black">Lifetime Avg</div>
                    <div id="h-avg" class="text-xl font-black">0</div>
                </div>
            </div>
            <div id="h-grid" class="cal-grid"></div>
            <div class="flex justify-between text-[8px] font-black uppercase tracking-widest text-zinc-500 px-1">
                <span>Last 28 Days</span>
                <span>Today</span>
            </div>
        </div>
    </div>

    <div id="period-modal" class="modal" onclick="this.style.display='none'">
        <div class="glass w-full p-6 space-y-4" onclick="event.stopPropagation()">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 text-center tracking-widest">Select Period</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setP('today')" class="glass p-3 text-[10px] font-bold">TODAY</button>
                <button onclick="setP('7d')" class="glass p-3 text-[10px] font-bold">LAST 7 DAYS</button>
                <button onclick="setP('1m')" class="glass p-3 text-[10px] font-bold">LAST MONTH</button>
                <button onclick="setP('3m')" class="glass p-3 text-[10px] font-bold">3 MONTHS</button>
                <button onclick="setP('all')" class="glass p-3 text-[10px] font-bold">INCEPTION</button>
                <button onclick="setP('custom')" class="glass p-3 text-[10px] font-bold">CUSTOM</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="tab('log')" id="t-log" class="nav-btn active">LOG</div>
        <div onclick="tab('cal')" id="t-cal" class="nav-btn">CALENDAR</div>
        <div onclick="tab('stats')" id="t-stats" class="nav-btn">INSIGHTS</div>
    </nav>

    <script>
        const quotes = ["DISCIPLINE = FREEDOM", "WIN THE MORNING", "STAY UNCOMFORTABLE", "ONE MORE REP", "HARD WORK WORKS"];
        const schema = [
            { id: 'm_push', label: 'Morning Pushups', type: 'sel', range: [0, 150, 5], cat: 'Rituals' },
            { id: 'm_squat', label: 'Morning Squats', type: 'sel', range: [0, 150, 5], cat: 'Rituals' },
            { id: 'neeti', label: 'Jal Neeti', type: 'chk', cat: 'Rituals' },
            { id: 'floss', label: 'Flossing', type: 'chk', cat: 'Rituals' },
            { id: 'mouth', label: 'Mouth Taping', type: 'chk', cat: 'Rituals' },
            { id: 'med', label: 'Meditation', type: 'num', unit: 'min', cat: 'Mental' },
            { id: 'hanuman', label: 'Hanuman Chalisa', type: 'chk', cat: 'Mental' },
            { id: 'news', label: 'Newspaper', type: 'chk', cat: 'Mental' },
            { id: 'book', label: 'Read Book', type: 'sel', range: [5, 100, 5], cat: 'Mental' },
            { id: 'journ', label: 'Journaled', type: 'chk', cat: 'Mental' },
            { id: 'fin', label: 'Finshots', type: 'chk', cat: 'Mental' },
            { id: 'work', label: 'Workout', type: 'work', cat: 'Physical' },
            { id: 'steps', label: 'Steps', type: 'sel', steps: true, cat: 'Physical' },
            { id: 'hang', label: 'Dead Hang', type: 'sel', range: [0, 300, 5], cat: 'Physical' },
            { id: 'prot', label: 'Protein', type: 'sel', range: [90, 200, 5], cat: 'Nutrition' },
            { id: 'creat', label: 'Creatine', type: 'sel', range: [0, 10, 1], cat: 'Nutrition' },
            { id: 'water', label: 'Water', type: 'sel', range: [2, 5, 0.25], cat: 'Nutrition' },
            { id: 'alc', label: 'No Alcohol', type: 'chk', cat: 'Vices' },
            { id: 'fried', label: 'No Fried', type: 'chk', cat: 'Vices' },
            { id: 'sug', label: 'No Sugar', type: 'chk', cat: 'Vices' },
            { id: 'smoke', label: 'No Smoking', type: 'chk', cat: 'Vices' }
        ];

        let db = JSON.parse(localStorage.getItem('ultimate_v8')) || {};
        let activeDate = new Date().toISOString().split('T')[0];
        let viewMonth = new Date();

        function fmt(dStr) {
            const d = new Date(dStr);
            const m = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            return `${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
        }

        function render() {
            document.getElementById('quote').innerText = quotes[new Date().getDate() % quotes.length];
            document.getElementById('cur-date-label').innerText = fmt(activeDate);
            const container = document.getElementById('tasks');
            container.innerHTML = '';
            
            const cats = [...new Set(schema.map(s => s.cat))];
            cats.forEach(c => {
                let html = `<div class="glass p-5"><h3 class="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-4 border-b border-white/5 pb-2">${c}</h3><div class="space-y-5">`;
                schema.filter(s => s.cat === c).forEach(s => {
                    const data = db[activeDate] || {};
                    const checked = data[s.id + '_c'] || false;
                    const val = data[s.id + '_v'] || '';

                    html += `<div class="flex items-center justify-between">
                        <div class="flex items-center gap-3" onclick="showHabit('${s.id}')">
                            <label class="cb-container" onclick="event.stopPropagation()"><input type="checkbox" onchange="upd('${s.id}','c',this.checked)" ${checked?'checked':''}><span class="checkmark"></span></label>
                            <span class="text-sm font-bold ${checked?'text-white':'text-zinc-600'}">${s.label}</span>
                        </div>`;
                    
                    if(s.type === 'sel') {
                        html += `<select onchange="upd('${s.id}','v',this.value)"><option value="">-</option>`;
                        if(s.steps) { for(let i=8000; i<=20000; i+=500) html += `<option value="${i}" ${val==i?'selected':''}>${i}</option>`; }
                        else { for(let i=s.range[0]; i<=s.range[1]; i+=s.range[2]) html += `<option value="${i}" ${val==i?'selected':''}>${i}</option>`; }
                        html += `</select>`;
                    } else if(s.type === 'num') {
                        html += `<input type="number" value="${val}" onchange="upd('${s.id}','v',this.value)" placeholder="${s.unit}">`;
                    } else if(s.type === 'work') {
                        html += `<select onchange="upd('${s.id}','v',this.value)"><option value="">-</option>
                        ${["Back","Biceps","Chest","Legs","Core","Run","Other"].map(o => `<option value="${o}" ${val==o?'selected':''}>${o}</option>`).join('')}</select>`;
                    }
                    html += `</div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
            calc();
        }

        function upd(id, k, v) { if(!db[activeDate]) db[activeDate] = {}; db[activeDate][id+'_'+k] = v; calc(); }
        
        function calc() {
            const data = db[activeDate] || {};
            let done = schema.filter(s => data[s.id + '_c']).length;
            document.getElementById('big-score').innerText = Math.round((done / schema.length) * 100) + '%';
        }

        function save() { localStorage.setItem('ultimate_v8', JSON.stringify(db)); alert("LOGGED."); }

        function showHabit(id) {
            const s = schema.find(x => x.id === id);
            document.getElementById('h-title').innerText = s.label;
            const grid = document.getElementById('h-grid'); grid.innerHTML = '';
            let total = 0, cnt = 0;
            for(let i=27; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                const done = db[ds] && db[ds][id+'_c'];
                const val = db[ds] ? parseFloat(db[ds][id+'_v']) : NaN;
                if(!isNaN(val)) { total += val; cnt++; }
                grid.innerHTML += `<div class="cal-cell ${done ? 'cell-green' : 'cell-red'}">${d.getDate()}</div>`;
            }
            document.getElementById('h-avg').innerText = cnt > 0 ? (total/cnt).toFixed(1) : '-';
            document.getElementById('habit-modal').style.display = 'flex';
        }

        function tab(t) {
            ['log','cal','stats'].forEach(v => document.getElementById('v-'+v).classList.add('hidden'));
            document.getElementById('v-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active');
            if(t==='cal') renderCal();
        }

        function renderCal() {
            const grid = document.getElementById('main-cal-grid'); grid.innerHTML = '';
            const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'}).format(viewMonth);
            const first = new Date(y,m,1).getDay(), last = new Date(y,m+1,0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=last; i++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                grid.innerHTML += `<div onclick="jump('${ds}')" class="cal-cell ${ds===activeDate?'border-green-500':''} ${db[ds]?'cell-green':''}">${i}</div>`;
            }
        }

        function jump(d) { activeDate = d; tab('log'); render(); }
        function chMonth(n) { viewMonth.setMonth(viewMonth.getMonth() + n); renderCal(); }
        function openPeriod() { document.getElementById('period-modal').style.display = 'flex'; }
        function setP(p) { document.getElementById('period-modal').style.display = 'none'; if(p==='today') jump(new Date().toISOString().split('T')[0]); }

        render();
    </script>
</body>
</html>
